def configValue = { String key, String fallback ->
    def propertyValue = providers.gradleProperty(key).orNull
    def environmentValue = providers.environmentVariable(key).orNull
    return propertyValue ?: environmentValue ?: fallback
}
def javaString = { String value ->
    return '"' + value.replace('\\', '\\\\').replace('"', '\\"') + '"'
}
def sha256Hex = { String value ->
    return java.security.MessageDigest.getInstance('SHA-256')
            .digest(value.getBytes(java.nio.charset.StandardCharsets.UTF_8))
            .encodeHex()
            .toString()
}
def sha256FileHex = { File source ->
    return java.security.MessageDigest.getInstance('SHA-256')
            .digest(source.bytes)
            .encodeHex()
            .toString()
}
def runGit = { List<String> arguments ->
    def command = ['git', '-C', rootProject.projectDir.parentFile.absolutePath]
    command.addAll(arguments)
    def process
    try {
        process = new ProcessBuilder(command)
                .redirectErrorStream(true)
                .start()
    } catch (Exception unavailable) {
        throw new GradleException('Release build requires Git source verification', unavailable)
    }
    def output = process.inputStream.getText('UTF-8').trim()
    if (process.waitFor() != 0) {
        throw new GradleException('Release build could not verify the Git source worktree')
    }
    return output
}
def resolveCleanGitSourceRevision = {
    if (runGit(['rev-parse', '--is-inside-work-tree']) != 'true') {
        throw new GradleException('Release build requires a Git worktree')
    }
    def sourceRevision = runGit(['rev-parse', '--verify', 'HEAD'])
    if (!sourceRevision.matches('[a-f0-9]{40}')) {
        throw new GradleException('Release build requires a canonical Git source revision')
    }
    if (!runGit(['status', '--porcelain', '--untracked-files=normal']).isEmpty()) {
        throw new GradleException('Release build requires a clean Git worktree')
    }
    return sourceRevision
}

