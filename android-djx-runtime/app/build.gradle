plugins {
    id 'com.android.application'
}

def configValue = { String key, String fallback ->
    def propertyValue = providers.gradleProperty(key).orNull
    def environmentValue = providers.environmentVariable(key).orNull
    return propertyValue ?: environmentValue ?: fallback
}
def javaString = { String value ->
    return '"' + value.replace('\\', '\\\\').replace('"', '\\"') + '"'
}

def skitApplicationId = configValue('SKIT_APPLICATION_ID', 'top.neoshen.xingheyingguan')
def skitAppName = configValue('SKIT_APP_NAME', '短剧 SaaS')
def pangleAppId = configValue('SKIT_PANGLE_APP_ID', '5850994')
def pangleSettingAsset = 'SDK_Setting.json'
def takuAppId = configValue('SKIT_TAKU_APP_ID', 'a6a50ac83df403')
def takuAppKey = configValue('SKIT_TAKU_APP_KEY', '')
def takuRewardPlacementId = configValue('SKIT_TAKU_REWARD_PLACEMENT_ID', 'b6a50acf394505')
def releaseStoreFile = configValue('SKIT_RELEASE_STORE_FILE', '')

android {
    namespace 'top.neoshen.xingheyingguan'
    compileSdk 36

    defaultConfig {
        applicationId skitApplicationId
        minSdk 24
        targetSdk 36
        versionCode 3
        versionName '2026.07.10-djx'
        buildConfigField 'String', 'PANGLE_APP_ID', javaString(pangleAppId)
        buildConfigField 'String', 'PANGLE_SETTING_ASSET', javaString(pangleSettingAsset)
        buildConfigField 'String', 'TAKU_APP_ID', javaString(takuAppId)
        buildConfigField 'String', 'TAKU_APP_KEY', javaString(takuAppKey)
        buildConfigField 'String', 'TAKU_REWARD_PLACEMENT_ID', javaString(takuRewardPlacementId)
        resValue 'string', 'skit_agent_app_name', skitAppName
    }

    buildFeatures {
        buildConfig true
    }

    signingConfigs {
        debug {
            storeFile file('../debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        if (releaseStoreFile) {
            release {
                storeFile file(releaseStoreFile)
                storePassword configValue('SKIT_RELEASE_STORE_PASSWORD', '')
                keyAlias configValue('SKIT_RELEASE_KEY_ALIAS', '')
                keyPassword configValue('SKIT_RELEASE_KEY_PASSWORD', '')
            }
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            debuggable true
            manifestPlaceholders = [skitUsesCleartextTraffic: 'true']
        }
        release {
            if (releaseStoreFile) {
                signingConfig signingConfigs.release
            }
            minifyEnabled false
            shrinkResources false
            manifestPlaceholders = [skitUsesCleartextTraffic: 'false']
        }
    }

    packaging {
        resources {
            excludes += [
                    'META-INF/DEPENDENCIES',
                    'META-INF/LICENSE',
                    'META-INF/LICENSE.txt',
                    'META-INF/NOTICE',
                    'META-INF/NOTICE.txt',
                    'META-INF/*.kotlin_module'
            ]
        }
    }
}

configurations.configureEach {
    resolutionStrategy {
        force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
        force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'
        force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
    }
}

dependencies {
    implementation files(
            'libs/taku/anythink_core_6.6.22.aar',
            'libs/taku/anythink_common_util_1.1.3.aar',
            'libs/taku/anythink_network_csj_7.6.1.2.1.0.aar',
            'libs/taku/anythink_network_kuaishou_5.4.10.2.1.1.aar',
            'libs/taku/kssdk-ad-5.4.10.2-publishRelease-2d5f51e600.aar',
            'libs/taku/anythink_network_gdt_4.690.1560.1.2.aar',
            'libs/taku/GDTSDK.unionNormal.4.690.1560.aar',
            'libs/taku/anythink_network_baidu_9.450.1.2.aar',
            'libs/taku/Baidu_MobAds_SDK-release_v9.450.aar',
            'libs/taku/anythink_network_adx_kuying_sdk_necessary_6.5.75.1.2.aar',
            'libs/taku/anythink_adx_sdk_kuying_6.5.75_necessary.aar'
    )
    implementation 'androidx.core:core:1.13.1'
    implementation 'com.pangle_beta.cn:mediation-sdk:7.1.0.5'
    implementation 'com.pangle.cn:pangrowth-base:2.9.0.9'
    implementation 'com.pangle.cn:pangrowth-djx-sdk-lite:2.9.0.9'
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'
}
