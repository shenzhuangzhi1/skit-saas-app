<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>短剧 SaaS</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #0f1115;
        color: #f8fafc;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      button {
        border: 0;
        font: inherit;
      }

      .app {
        min-height: 100vh;
        padding: max(18px, env(safe-area-inset-top)) 16px calc(86px + env(safe-area-inset-bottom));
        background:
          radial-gradient(circle at 22% 8%, rgba(248, 92, 79, 0.24), transparent 32%),
          radial-gradient(circle at 82% 12%, rgba(20, 184, 166, 0.22), transparent 28%),
          linear-gradient(180deg, #151821 0%, #0d0f14 100%);
      }

      .tab-page[hidden],
      .bottom-tabbar[hidden] {
        display: none;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 18px;
      }

      .brand {
        display: grid;
        gap: 4px;
      }

      .brand h1 {
        margin: 0;
        font-size: 24px;
        letter-spacing: 0;
      }

      .brand span {
        color: rgba(248, 250, 252, 0.68);
        font-size: 13px;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-height: 32px;
        padding: 0 10px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.08);
        color: rgba(248, 250, 252, 0.78);
        font-size: 12px;
        white-space: nowrap;
      }

      .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #f59e0b;
      }

      .dot.is-ok {
        background: #22c55e;
      }

      .hero {
        position: relative;
        min-height: 360px;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        margin-bottom: 22px;
        padding: 20px;
        overflow: hidden;
        border-radius: 8px;
        background-color: #351824;
        background-image: var(--cover, linear-gradient(145deg, #24152e 0%, #8d2b36 48%, #f97316 100%));
        background-position: center;
        background-repeat: no-repeat;
        background-size: cover;
        box-shadow: 0 18px 38px rgba(0, 0, 0, 0.32);
      }

      .hero:before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 72% 16%, rgba(255, 255, 255, 0.18), transparent 28%),
          linear-gradient(180deg, rgba(0, 0, 0, 0.04) 8%, rgba(0, 0, 0, 0.84) 100%);
      }

      .hero > * {
        position: relative;
      }

      .hero h2 {
        margin: 0 0 8px;
        font-size: 30px;
        line-height: 1.16;
        letter-spacing: 0;
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.46);
      }

      .hero p {
        margin: 0 0 16px;
        color: rgba(255, 255, 255, 0.82);
        font-size: 14px;
        line-height: 1.55;
        display: -webkit-box;
        overflow: hidden;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 3;
      }

      .hero-label {
        margin-bottom: 10px;
        color: #ffd6c2;
        font-size: 12px;
        font-weight: 700;
      }

      .hero-tags,
      .hero-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .hero-tags {
        margin-bottom: 14px;
      }

      .hero-tags span {
        padding: 5px 9px;
        border-radius: 14px;
        background: rgba(0, 0, 0, 0.38);
        color: rgba(255, 255, 255, 0.88);
        font-size: 11px;
        backdrop-filter: blur(6px);
      }

      .primary-btn,
      .ghost-btn {
        height: 42px;
        min-width: 112px;
        padding: 0 18px;
        border-radius: 22px;
        font-weight: 700;
      }

      .primary-btn {
        background: #f8d35b;
        color: #15120a;
      }

      .ghost-btn {
        background: rgba(255, 255, 255, 0.12);
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.22);
      }

      .section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin: 22px 0 12px;
      }

      .section-head h3 {
        margin: 0;
        font-size: 18px;
        letter-spacing: 0;
      }

      .section-head button {
        padding: 0;
        color: rgba(248, 250, 252, 0.64);
        background: transparent;
        font-size: 13px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .load-more {
        width: 100%;
        height: 42px;
        margin: 16px 0 8px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.1);
        color: rgba(248, 250, 252, 0.78);
        font-size: 14px;
      }

      .load-more[hidden] {
        display: none;
      }

      .load-more:disabled {
        color: rgba(248, 250, 252, 0.42);
      }

      .filter-row {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        margin: 2px -16px 16px;
        padding: 0 16px 4px;
      }

      .filter-chip {
        flex: 0 0 auto;
        height: 34px;
        padding: 0 14px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.08);
        color: rgba(248, 250, 252, 0.72);
        font-size: 13px;
      }

      .filter-chip.is-active {
        background: #f8d35b;
        color: #171306;
        font-weight: 750;
      }

      .drama-card {
        overflow: hidden;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .cover {
        aspect-ratio: 0.75;
        display: flex;
        align-items: flex-end;
        padding: 12px;
        background: var(--cover);
        background-size: cover;
        background-position: center;
      }

      .cover span {
        padding: 4px 8px;
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.44);
        color: #fff;
        font-size: 12px;
      }

      .card-body {
        padding: 10px;
      }

      .card-title {
        min-height: 38px;
        font-size: 15px;
        font-weight: 750;
        line-height: 1.28;
      }

      .card-meta {
        margin-top: 7px;
        color: rgba(248, 250, 252, 0.58);
        font-size: 12px;
      }

      #profile {
        margin: calc(-1 * max(18px, env(safe-area-inset-top))) -16px calc(-1 * (86px + env(safe-area-inset-bottom)));
      }

      .profile-shell {
        min-height: 100vh;
        padding-bottom: calc(92px + env(safe-area-inset-bottom));
        background: #f4f4f4;
        color: #202020;
      }

      .profile-hero {
        display: flex;
        align-items: center;
        min-height: 210px;
        padding: max(54px, calc(env(safe-area-inset-top) + 34px)) 24px 58px;
        background: linear-gradient(155deg, #ff6a22 0%, #e94e22 46%, #231817 100%);
        color: #fff;
      }

      .profile-avatar {
        position: relative;
        width: 58px;
        height: 58px;
        flex: 0 0 58px;
        border: 1px solid rgba(255, 255, 255, 0.46);
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.18);
      }

      .profile-avatar:before,
      .profile-avatar:after {
        content: "";
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        background: #fff;
      }

      .profile-avatar:before {
        top: 13px;
        width: 15px;
        height: 15px;
        border-radius: 50%;
      }

      .profile-avatar:after {
        bottom: 11px;
        width: 29px;
        height: 15px;
        border-radius: 18px 18px 8px 8px;
      }

      .profile-copy {
        min-width: 0;
        margin-left: 14px;
      }

      .profile-name {
        margin: 0;
        font-size: 21px;
        font-weight: 800;
      }

      .profile-id {
        margin-top: 7px;
        color: rgba(255, 255, 255, 0.74);
        font-size: 13px;
      }

      .profile-stats {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        margin: -34px 16px 0;
        padding: 17px 0;
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 12px 30px rgba(33, 20, 14, 0.12);
      }

      .profile-stat {
        min-width: 0;
        text-align: center;
      }

      .profile-stat strong {
        display: block;
        color: #1d1d1d;
        font-size: 19px;
      }

      .profile-stat span {
        display: block;
        margin-top: 4px;
        color: #8d8d8d;
        font-size: 12px;
      }

      .profile-section,
      .profile-menu,
      .profile-service {
        margin: 14px 16px 0;
        border-radius: 8px;
        background: #fff;
      }

      .profile-section,
      .profile-service {
        padding: 16px;
      }

      .profile-section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 13px;
      }

      .profile-section h3,
      .profile-service h3 {
        margin: 0;
        font-size: 17px;
      }

      .profile-link {
        padding: 0;
        background: transparent;
        color: #999;
        font-size: 12px;
      }

      .profile-follow-list {
        display: flex;
        gap: 10px;
        overflow-x: auto;
      }

      .follow-card {
        width: 106px;
        flex: 0 0 106px;
        padding: 0;
        background: transparent;
        color: #222;
        text-align: left;
      }

      .follow-cover {
        width: 100%;
        aspect-ratio: 0.75;
        border-radius: 6px;
        background-image: var(--cover);
        background-position: center;
        background-size: cover;
      }

      .follow-title {
        margin-top: 7px;
        overflow: hidden;
        font-size: 13px;
        font-weight: 700;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .profile-menu {
        padding: 0 16px;
      }

      .profile-menu-item {
        width: 100%;
        min-height: 54px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0;
        border-bottom: 1px solid #f0f0f0;
        background: transparent;
        color: #222;
        text-align: left;
      }

      .profile-menu-item:last-child {
        border-bottom: 0;
      }

      .profile-menu-copy {
        display: flex;
        align-items: center;
        gap: 11px;
        font-size: 15px;
        font-weight: 650;
      }

      .profile-menu-icon {
        display: grid;
        width: 26px;
        height: 26px;
        place-items: center;
        border-radius: 50%;
        color: #fff;
        font-size: 14px;
        line-height: 1;
      }

      .profile-menu-icon.follow {
        background: #ff5a1f;
      }

      .profile-menu-icon.vip {
        background: #f3aa19;
      }

      .profile-menu-icon.about {
        background: #3d8bff;
        font-weight: 800;
      }

      .profile-caret {
        color: #b0b0b0;
        font-size: 22px;
      }

      .profile-service p {
        margin: 9px 0 0;
        color: #777;
        font-size: 13px;
        line-height: 1.6;
      }

      .profile-sdk-row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        margin-top: 13px;
        padding-top: 13px;
        border-top: 1px solid #eee;
        color: #888;
        font-size: 12px;
      }

      .profile-sdk-row strong {
        color: #2f8f55;
        text-align: right;
      }

      .player {
        display: none;
        min-height: 100vh;
        margin: calc(-1 * max(18px, env(safe-area-inset-top))) -16px calc(-1 * (86px + env(safe-area-inset-bottom)));
        background: #050506;
      }

      .player.is-open {
        display: block;
      }

      .screen {
        position: relative;
        min-height: 100vh;
        overflow: hidden;
        background: var(--cover);
      }

      .screen:before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.92));
      }

      .player-head {
        position: relative;
        z-index: 3;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: max(18px, env(safe-area-inset-top)) 16px 12px;
      }

      .icon-btn {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.38);
        color: #fff;
        font-size: 22px;
      }

      .player-title {
        flex: 1;
        min-width: 0;
        font-size: 16px;
        font-weight: 750;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .stage {
        position: relative;
        z-index: 2;
        min-height: calc(100vh - 260px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 28px;
        text-align: center;
      }

      .stage-note {
        max-width: 340px;
        padding: 18px;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.42);
        backdrop-filter: blur(8px);
      }

      .stage-note strong {
        display: block;
        margin-bottom: 8px;
        font-size: 18px;
      }

      .stage-note span {
        color: rgba(255, 255, 255, 0.72);
        font-size: 13px;
        line-height: 1.5;
      }

      .locked {
        position: absolute;
        left: 18px;
        right: 18px;
        bottom: 162px;
        z-index: 4;
        padding: 18px;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.64);
        text-align: center;
      }

      .locked h3 {
        margin: 0 0 6px;
        font-size: 19px;
      }

      .locked p {
        margin: 0 0 14px;
        color: rgba(255, 255, 255, 0.72);
        font-size: 13px;
      }

      .player-bottom {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 3;
        padding: 16px 16px max(18px, env(safe-area-inset-bottom));
      }

      .episode-row {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding: 4px 0 12px;
      }

      .episode {
        flex: 0 0 42px;
        height: 42px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.13);
        color: #fff;
        font-weight: 750;
      }

      .episode.is-active {
        background: #f8d35b;
        color: #171306;
      }

      .episode.is-locked:after {
        content: "锁";
        display: block;
        margin-top: -3px;
        font-size: 10px;
        font-weight: 500;
      }

      .toast {
        position: fixed;
        left: 50%;
        bottom: max(34px, env(safe-area-inset-bottom));
        z-index: 20;
        max-width: calc(100vw - 36px);
        transform: translateX(-50%);
        padding: 11px 14px;
        border-radius: 18px;
        background: rgba(0, 0, 0, 0.82);
        color: #fff;
        font-size: 13px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.18s ease;
      }

      .toast.is-open {
        opacity: 1;
      }

      .info-modal {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: grid;
        align-items: end;
        background: rgba(0, 0, 0, 0.58);
      }

      .info-modal[hidden] {
        display: none;
      }

      .info-sheet {
        padding: 22px 20px calc(22px + env(safe-area-inset-bottom));
        border-radius: 8px 8px 0 0;
        background: #fff;
        color: #202020;
      }

      .info-sheet-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .info-sheet h3 {
        margin: 0;
        font-size: 20px;
      }

      .info-sheet p {
        margin: 14px 0 0;
        color: #6f6f6f;
        font-size: 14px;
        line-height: 1.7;
      }

      .info-close {
        width: 36px;
        height: 36px;
        flex: 0 0 36px;
        border-radius: 50%;
        background: #f1f1f1;
        color: #555;
        font-size: 22px;
      }

      .bottom-tabbar {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 30;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        min-height: calc(64px + env(safe-area-inset-bottom));
        padding: 7px 8px calc(7px + env(safe-area-inset-bottom));
        background: rgba(15, 17, 21, 0.94);
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(16px);
      }

      .tabbar-item {
        display: grid;
        place-items: center;
        align-content: center;
        gap: 4px;
        min-width: 0;
        background: transparent;
        color: rgba(248, 250, 252, 0.56);
        font-size: 12px;
      }

      .tabbar-icon {
        position: relative;
        width: 22px;
        height: 22px;
      }

      .tabbar-icon:before,
      .tabbar-icon:after {
        content: "";
        position: absolute;
        border-radius: 4px;
        background: currentColor;
      }

      .tabbar-icon.home:before {
        left: 4px;
        top: 8px;
        width: 14px;
        height: 10px;
      }

      .tabbar-icon.home:after {
        left: 5px;
        top: 3px;
        width: 12px;
        height: 12px;
        transform: rotate(45deg);
      }

      .tabbar-icon.theater:before {
        left: 3px;
        top: 4px;
        width: 16px;
        height: 14px;
        border-radius: 5px;
      }

      .tabbar-icon.theater:after {
        left: 7px;
        top: 8px;
        width: 0;
        height: 0;
        background: transparent;
        border-top: 4px solid transparent;
        border-bottom: 4px solid transparent;
        border-left: 7px solid #0f1115;
      }

      .tabbar-icon.my:before {
        left: 7px;
        top: 3px;
        width: 8px;
        height: 8px;
        border-radius: 50%;
      }

      .tabbar-icon.my:after {
        left: 4px;
        top: 13px;
        width: 14px;
        height: 7px;
        border-radius: 8px 8px 4px 4px;
      }

      .tabbar-item.is-active {
        color: #f8d35b;
        font-weight: 750;
      }
    </style>
  </head>
  <body>
    <main class="app" id="app">
      <section class="tab-page" id="home">
        <div class="topbar">
          <div class="brand">
            <h1>短剧 SaaS</h1>
            <span>真实 SDK 验证包</span>
          </div>
          <div class="status"><i class="dot" id="sdkDot"></i><span id="sdkStatus">SDK 初始化中</span></div>
        </div>

        <section class="hero" id="hero">
          <div class="hero-label">正在热播</div>
          <h2 id="heroTitle">重生后我在商界封神</h2>
          <p id="heroDesc">她被合伙人夺走一切，重回签约前夜，用一纸合同翻盘整座商界。</p>
          <div class="hero-tags">
            <span id="heroCategory">逆袭</span>
            <span id="heroStatus">连载中</span>
            <span id="heroEpisodeCount">36集</span>
          </div>
          <div class="hero-actions">
            <button class="primary-btn" id="heroPlay">立即试看</button>
            <button class="ghost-btn" id="heroFollow">加入追剧</button>
          </div>
        </section>

        <div class="section-head">
          <h3>推荐短剧</h3>
          <button id="refreshNative">刷新真实剧单</button>
        </div>
        <section class="grid" id="grid"></section>
        <button class="load-more" id="loadMoreNative" type="button" hidden>加载更多真实剧单</button>
      </section>

      <section class="tab-page" id="theater" hidden>
        <div class="topbar">
          <div class="brand">
            <h1>剧场</h1>
            <span>穿山甲真实剧单</span>
          </div>
          <div class="status"><i class="dot is-ok"></i><span id="theaterCount">剧单同步中</span></div>
        </div>
        <div class="filter-row" id="categoryFilters"></div>
        <section class="grid" id="theaterGrid"></section>
      </section>

      <section class="tab-page" id="profile" hidden>
        <div class="profile-shell">
          <header class="profile-hero" id="profileLogin">
            <div class="profile-avatar" aria-hidden="true"></div>
            <div class="profile-copy">
              <h1 class="profile-name">点击登录</h1>
              <div class="profile-id">ID：SKIT-<span id="profileVisitorId">000000</span></div>
            </div>
          </header>

          <section class="profile-stats" aria-label="账户统计">
            <div class="profile-stat"><strong id="profileFollowCount">0</strong><span>追剧</span></div>
            <div class="profile-stat"><strong id="profileHistoryCount">0</strong><span>观看</span></div>
            <div class="profile-stat"><strong>VIP</strong><span>权益</span></div>
          </section>

          <section class="profile-section" id="profileFollowPanel" hidden>
            <div class="profile-section-head">
              <h3>我的追剧</h3>
              <button class="profile-link" id="profileFollowAll" type="button">查看全部</button>
            </div>
            <div class="profile-follow-list" id="profileFollowList"></div>
          </section>

          <nav class="profile-menu" aria-label="我的功能">
            <button class="profile-menu-item" id="profileFollowMenu" type="button">
              <span class="profile-menu-copy"><i class="profile-menu-icon follow">♥</i>我的追剧</span>
              <span class="profile-caret">›</span>
            </button>
            <button class="profile-menu-item" id="profileVipMenu" type="button">
              <span class="profile-menu-copy"><i class="profile-menu-icon vip">★</i>VIP 权益</span>
              <span class="profile-caret">›</span>
            </button>
            <button class="profile-menu-item" id="profileAboutMenu" type="button">
              <span class="profile-menu-copy"><i class="profile-menu-icon about">i</i>关于短剧 SaaS</span>
              <span class="profile-caret">›</span>
            </button>
          </nav>

          <section class="profile-service">
            <h3>内容能力</h3>
            <p>推荐短剧、剧场分类、播放选集、看广告解锁、追剧与观看历史已接入当前测试包。</p>
            <div class="profile-sdk-row">
              <span>短剧 SDK</span>
              <strong><span id="profileSdkStatus">初始化中</span> · <span id="profileDramaCount">0</span> 部</strong>
            </div>
          </section>
        </div>
      </section>

      <section class="player" id="player"></section>
    </main>

    <div class="toast" id="toast"></div>
    <div class="info-modal" id="infoModal" role="dialog" aria-modal="true" hidden>
      <section class="info-sheet">
        <div class="info-sheet-head">
          <h3 id="infoModalTitle"></h3>
          <button class="info-close" id="infoModalClose" type="button" aria-label="关闭">×</button>
        </div>
        <p id="infoModalBody"></p>
      </section>
    </div>
    <nav class="bottom-tabbar" id="tabbar" aria-label="底部导航">
      <button class="tabbar-item is-active" data-tab="home" type="button">
        <span class="tabbar-icon home"></span>
        <span>首页</span>
      </button>
      <button class="tabbar-item" data-tab="theater" type="button">
        <span class="tabbar-icon theater"></span>
        <span>剧场</span>
      </button>
      <button class="tabbar-item" data-tab="profile" type="button">
        <span class="tabbar-icon my"></span>
        <span>我的</span>
      </button>
    </nav>

    <script>
      const TAKU_PLACEMENT_ID = "b6a50acf394505";
      const PANGLE_SETTING_FILE = "SDK_Setting_5850994.json";
      const PANGLE_INITIAL_COUNT = 72;
      const PANGLE_PAGE_SIZE = 24;
      const FOLLOW_STORAGE_KEY = "skit_runtime_follows_v1";
      const HISTORY_STORAGE_KEY = "skit_runtime_history_v1";
      const VISITOR_STORAGE_KEY = "skit_runtime_visitor_v1";
      const callbacks = {};
      let sequence = 1;
      let toastTimer = 0;

      window.__SkitNativeBridgeResolve = function (id, rawResult) {
        const callback = callbacks[id];
        if (!callback) return;
        delete callbacks[id];
        let result = {};
        try {
          result = typeof rawResult === "string" ? JSON.parse(rawResult) : rawResult || {};
        } catch (error) {
          result = { success: false, message: String(error && error.message ? error.message : error) };
        }
        callback.resolve(result);
      };

      function callNative(nativeBridge, method, payload, timeoutMs = 20000) {
        return new Promise((resolve, reject) => {
          if (!nativeBridge || typeof nativeBridge.postMessage !== "function") {
            reject(new Error("原生 SDK 桥未注册"));
            return;
          }
          const id = "skit_" + Date.now() + "_" + sequence++;
          callbacks[id] = { resolve, reject };
          nativeBridge.postMessage(JSON.stringify({ id, method, payload: payload || {} }));
          setTimeout(() => {
            if (!callbacks[id]) return;
            delete callbacks[id];
            reject(new Error("原生 SDK 响应超时"));
          }, timeoutMs);
        });
      }

      const fallbackDramas = [
        {
          id: "reborn-business-queen",
          title: "重生后我在商界封神",
          category: "逆袭",
          total: 36,
          freeEpisodes: 6,
          unlockSize: 4,
          heat: "982.4万",
          status: "连载中",
          cover: "linear-gradient(155deg,#1d1028 0%,#7a2533 48%,#ff7a1a 100%)",
          desc: "她被合伙人夺走一切，重回签约前夜，用一纸合同翻盘整座商界。",
        },
        {
          id: "flash-marriage-ceo",
          title: "闪婚后总裁每天求公开",
          category: "甜宠",
          total: 48,
          freeEpisodes: 8,
          unlockSize: 5,
          heat: "814.9万",
          status: "已完结",
          cover: "linear-gradient(155deg,#fff0e4 0%,#f16c5b 48%,#34162f 100%)",
          desc: "一场合约婚姻，两个人都以为只是合作，却在热搜里越演越真。",
        },
        {
          id: "night-city-detective",
          title: "夜城十二点",
          category: "悬疑",
          total: 30,
          freeEpisodes: 5,
          unlockSize: 3,
          heat: "701.6万",
          status: "连载中",
          cover: "linear-gradient(155deg,#051923 0%,#126782 48%,#f8c630 100%)",
          desc: "匿名短信把失踪案、旧码头和一场豪门婚礼连在一起。",
        },
        {
          id: "imperial-doctor",
          title: "医妃她不装了",
          category: "古装",
          total: 42,
          freeEpisodes: 7,
          unlockSize: 4,
          heat: "646.2万",
          status: "已完结",
          cover: "linear-gradient(155deg,#132a13 0%,#4f772d 48%,#f4d35e 100%)",
          desc: "她凭一手银针入局朝堂，救的是病人，拆的是满城权谋。",
        },
      ];

      let dramas = fallbackDramas.slice();
      let activeDrama = dramas[0];
      let activeEpisode = 1;
      let currentTab = "home";
      let currentCategory = "全部";
      let nativePage = 0;
      let nativeMode = false;
      let nativeHasMore = false;
      let nativeLoading = false;
      const unlocked = new Set();
      const followedDramaIds = new Set(readStoredList(FOLLOW_STORAGE_KEY));
      let watchHistory = readStoredList(HISTORY_STORAGE_KEY);

      function readStoredList(key) {
        try {
          const value = JSON.parse(localStorage.getItem(key) || "[]");
          return Array.isArray(value) ? value : [];
        } catch (error) {
          return [];
        }
      }

      function writeStoredList(key, value) {
        try {
          localStorage.setItem(key, JSON.stringify(value));
        } catch (error) {
          // The UI still works when WebView storage is unavailable.
        }
      }

      function getVisitorId() {
        try {
          const existing = localStorage.getItem(VISITOR_STORAGE_KEY);
          if (existing) return existing;
          const visitorId = String(Math.floor(Math.random() * 900000 + 100000));
          localStorage.setItem(VISITOR_STORAGE_KEY, visitorId);
          return visitorId;
        } catch (error) {
          return "100001";
        }
      }

      function saveWatchHistory(drama, episode) {
        const entry = {
          id: String(drama.id),
          episode: Number(episode) || 1,
          watchedAt: Date.now(),
        };
        watchHistory = [entry].concat(watchHistory.filter((item) => String(item.id) !== entry.id)).slice(0, 30);
        writeStoredList(HISTORY_STORAGE_KEY, watchHistory);
      }

      function toggleFollow(drama) {
        const id = String(drama.id);
        if (followedDramaIds.has(id)) {
          followedDramaIds.delete(id);
          showToast("已取消追剧");
        } else {
          followedDramaIds.add(id);
          showToast("已加入追剧");
        }
        writeStoredList(FOLLOW_STORAGE_KEY, Array.from(followedDramaIds));
        renderHome();
      }

      function showToast(message) {
        const node = document.getElementById("toast");
        node.textContent = message;
        node.classList.add("is-open");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => node.classList.remove("is-open"), 2200);
      }

      function showInfoModal(title, body) {
        document.getElementById("infoModalTitle").textContent = title;
        document.getElementById("infoModalBody").textContent = body;
        document.getElementById("infoModal").hidden = false;
      }

      function closeInfoModal() {
        document.getElementById("infoModal").hidden = true;
      }

      function setSdkStatus(text, ok) {
        document.getElementById("sdkStatus").textContent = text;
        document.getElementById("sdkDot").classList.toggle("is-ok", !!ok);
        document.getElementById("profileSdkStatus").textContent = text;
      }

      function formatDramaStatus(status) {
        if (status === 0 || status === "0") return "已完结";
        if (status === 1 || status === "1") return "连载中";
        return typeof status === "string" && status.trim() ? status.trim() : "热播中";
      }

      function normalizeNativeDrama(item) {
        const cover =
          item.coverImage ||
          (Array.isArray(item.coverImages) && item.coverImages[0] && (item.coverImages[0].url || item.coverImages[0].backupUrl));
        return {
          id: "pangle-" + String(item.id || item.index || item.title),
          nativeId: item.id,
          title: item.title || item.scriptName || "穿山甲短剧",
          category: item.type || "真实内容",
          total: Number(item.total || 24),
          freeEpisodes: Number(item.freeSet || 8),
          unlockSize: Number(item.lockSet || 5),
          heat: item.favoriteCount ? String(item.favoriteCount) : "真实剧单",
          status: formatDramaStatus(item.status),
          cover: cover ? "linear-gradient(rgba(0,0,0,.1),rgba(0,0,0,.36)),url('" + cover + "')" : "linear-gradient(155deg,#111827,#7c3aed,#06b6d4)",
          desc: item.desc || item.scriptAuthor || "来自穿山甲短剧内容 SDK 的授权剧集。",
          isNative: true,
        };
      }

      function isUnlocked(drama, episode) {
        return episode <= drama.freeEpisodes || unlocked.has(drama.id + ":" + episode);
      }

      function unlockRange(drama, episode) {
        const size = Math.max(1, Number(drama.unlockSize || 5));
        const end = Math.min(Number(drama.total || 1), episode + size - 1);
        const range = [];
        for (let i = episode; i <= end; i++) range.push(i);
        return range;
      }

      function createDramaCard(drama) {
        const card = document.createElement("article");
        card.className = "drama-card";

        const cover = document.createElement("div");
        cover.className = "cover";
        cover.style.setProperty("--cover", drama.cover);
        const category = document.createElement("span");
        category.textContent = drama.category;
        cover.appendChild(category);

        const body = document.createElement("div");
        body.className = "card-body";
        const title = document.createElement("div");
        title.className = "card-title";
        title.textContent = drama.title;
        const meta = document.createElement("div");
        meta.className = "card-meta";
        meta.textContent = drama.status + " · " + drama.total + "集 · " + drama.heat;
        body.append(title, meta);

        card.append(cover, body);
        card.onclick = () => openPlayer(drama, 1);
        return card;
      }

      function mergeNativeDramas(nextList) {
        const seen = new Set();
        return dramas
          .concat(nextList)
          .filter((drama) => {
            const key = String(drama.nativeId || drama.id || "");
            if (!key || seen.has(key)) return false;
            seen.add(key);
            return true;
          });
      }

      function updateLoadMoreButton() {
        const button = document.getElementById("loadMoreNative");
        button.hidden = !nativeMode;
        button.disabled = nativeLoading || !nativeHasMore;
        button.textContent = nativeLoading ? "真实剧单加载中" : nativeHasMore ? "加载更多真实剧单" : "已加载全部真实剧单";
      }

      function renderHome() {
        activeDrama = dramas[0] || fallbackDramas[0];
        document.getElementById("hero").style.setProperty("--cover", activeDrama.cover);
        document.getElementById("heroTitle").textContent = activeDrama.title;
        document.getElementById("heroDesc").textContent = activeDrama.desc;
        document.getElementById("heroCategory").textContent = activeDrama.category;
        document.getElementById("heroStatus").textContent = activeDrama.status;
        document.getElementById("heroEpisodeCount").textContent = activeDrama.total + "集";
        document.getElementById("heroPlay").onclick = () => openPlayer(activeDrama, 1);
        const followButton = document.getElementById("heroFollow");
        followButton.textContent = followedDramaIds.has(String(activeDrama.id)) ? "已追剧" : "加入追剧";
        followButton.onclick = () => toggleFollow(activeDrama);

        const grid = document.getElementById("grid");
        grid.innerHTML = "";
        dramas.forEach((drama) => {
          grid.appendChild(createDramaCard(drama));
        });
        renderTheater();
        renderProfile();
        updateLoadMoreButton();
      }

      function renderTheater() {
        const categories = ["全部"].concat([...new Set(dramas.map((item) => item.category || "其他"))].slice(0, 8));
        if (!categories.includes(currentCategory)) currentCategory = "全部";
        const filters = document.getElementById("categoryFilters");
        filters.innerHTML = "";
        categories.forEach((category) => {
          const btn = document.createElement("button");
          btn.className = "filter-chip" + (category === currentCategory ? " is-active" : "");
          btn.textContent = category;
          btn.onclick = () => {
            currentCategory = category;
            renderTheater();
          };
          filters.appendChild(btn);
        });

        const visible = currentCategory === "全部" ? dramas : dramas.filter((item) => item.category === currentCategory);
        document.getElementById("theaterCount").textContent = visible.length + " 部短剧";
        const grid = document.getElementById("theaterGrid");
        grid.innerHTML = "";
        visible.forEach((drama) => {
          grid.appendChild(createDramaCard(drama));
        });
      }

      function renderProfile() {
        document.getElementById("profileDramaCount").textContent = String(dramas.length);
        document.getElementById("profileFollowCount").textContent = String(followedDramaIds.size);
        document.getElementById("profileHistoryCount").textContent = String(watchHistory.length);

        const followedDramas = Array.from(followedDramaIds)
          .map((id) => dramas.find((drama) => String(drama.id) === String(id)))
          .filter(Boolean);
        const panel = document.getElementById("profileFollowPanel");
        const list = document.getElementById("profileFollowList");
        panel.hidden = followedDramas.length === 0;
        list.innerHTML = "";
        followedDramas.forEach((drama) => {
          const card = document.createElement("button");
          card.className = "follow-card";
          card.type = "button";
          const cover = document.createElement("div");
          cover.className = "follow-cover";
          cover.style.setProperty("--cover", drama.cover);
          const title = document.createElement("div");
          title.className = "follow-title";
          title.textContent = drama.title;
          card.append(cover, title);
          card.onclick = () => openPlayer(drama, 1);
          list.appendChild(card);
        });
      }

      function showTab(tab, rerender = true) {
        currentTab = tab;
        document.querySelectorAll(".tab-page").forEach((page) => {
          page.hidden = page.id !== tab;
        });
        document.querySelectorAll(".tabbar-item").forEach((item) => {
          item.classList.toggle("is-active", item.dataset.tab === tab);
        });
        document.getElementById("tabbar").hidden = false;
        const player = document.getElementById("player");
        player.classList.remove("is-open");
        player.innerHTML = "";
        if (rerender) {
          renderTheater();
          renderProfile();
        }
      }

      function openPlayer(drama, episode) {
        activeDrama = drama;
        activeEpisode = Math.max(1, Math.min(Number(episode) || 1, drama.total));
        saveWatchHistory(drama, activeEpisode);
        if (drama.isNative) {
          openNativePlayerFor(drama, activeEpisode);
          return;
        }
        showToast("真实剧单加载中，请刷新真实剧单");
      }

      function openLegacyPlayer(drama, episode) {
        activeDrama = drama;
        activeEpisode = Math.max(1, Math.min(Number(episode) || 1, drama.total));
        saveWatchHistory(drama, activeEpisode);
        document.querySelectorAll(".tab-page").forEach((page) => {
          page.hidden = true;
        });
        document.getElementById("tabbar").hidden = true;
        renderPlayer();
      }

      function renderPlayer() {
        const locked = !isUnlocked(activeDrama, activeEpisode);
        const player = document.getElementById("player");
        player.classList.add("is-open");
        player.innerHTML =
          '<div class="screen" id="playerScreen">' +
          '<div class="player-head"><button class="icon-btn" id="backBtn">‹</button><div class="player-title" id="playerTitle"></div></div>' +
          '<div class="stage"><div class="stage-note"><strong id="playerEpisode"></strong><span id="playerNote"></span></div></div>' +
          (locked
            ? '<div class="locked"><h3>本集需要解锁</h3><p>看完 Taku 激励视频后解锁后续剧集</p><button class="primary-btn" id="unlockBtn">看广告解锁</button></div>'
            : "") +
          '<div class="player-bottom"><div class="episode-row" id="episodes"></div><button class="ghost-btn" id="nativePlayerBtn">打开真实播放器</button></div>' +
          "</div>";

        document.getElementById("playerScreen").style.setProperty("--cover", activeDrama.cover);
        document.getElementById("playerTitle").textContent = activeDrama.title;
        document.getElementById("playerEpisode").textContent = "第" + activeEpisode + "集";
        document.getElementById("playerNote").textContent = activeDrama.desc || "";

        document.getElementById("backBtn").onclick = () => {
          player.classList.remove("is-open");
          player.innerHTML = "";
          showTab(currentTab, false);
        };
        const nativeBtn = document.getElementById("nativePlayerBtn");
        nativeBtn.onclick = openNativePlayer;

        if (locked) {
          document.getElementById("unlockBtn").onclick = unlockByAd;
        }

        const row = document.getElementById("episodes");
        const count = Math.min(activeDrama.total, 80);
        for (let i = 1; i <= count; i++) {
          const btn = document.createElement("button");
          btn.className = "episode" + (i === activeEpisode ? " is-active" : "") + (!isUnlocked(activeDrama, i) ? " is-locked" : "");
          btn.textContent = i;
          btn.onclick = () => openPlayer(activeDrama, i);
          row.appendChild(btn);
        }
      }

      async function unlockByAd() {
        const btn = document.getElementById("unlockBtn");
        btn.disabled = true;
        btn.textContent = "广告加载中";
        try {
          const result = await callNative(
            window.SkitTakuAdNative,
            "showRewardedVideo",
            {
              placementId: TAKU_PLACEMENT_ID,
              scene: "drama_unlock",
              dramaId: activeDrama.id,
              episode: activeEpisode,
              unlockRange: unlockRange(activeDrama, activeEpisode),
            },
            180000,
          );
          if (result && result.success === false) throw new Error(result.message || "Taku 广告加载失败");
          if (!result || (result.completed !== true && result.rewarded !== true)) throw new Error("完整观看广告后才能解锁");
          unlockRange(activeDrama, activeEpisode).forEach((episode) => unlocked.add(activeDrama.id + ":" + episode));
          showToast("已解锁后续剧集");
          renderPlayer();
        } catch (error) {
          btn.disabled = false;
          btn.textContent = "看广告解锁";
          showToast(error.message || "广告暂不可用");
        }
      }

      async function openNativePlayerFor(drama, episode) {
        if (!drama || !drama.isNative) {
          showToast("这条不是 SDK 真实剧，请先刷新真实剧单");
          return;
        }
        const safeEpisode = Math.max(1, Math.min(Number(episode) || 1, drama.total || 1));
        try {
          const result = await callNative(
            window.SkitPangleDramaNative,
            "openPlayer",
            {
              settingFile: PANGLE_SETTING_FILE,
              dramaId: Number(drama.nativeId || 0),
              episode: safeEpisode,
              freeSet: drama.freeEpisodes,
              lockSet: drama.unlockSize,
              unlockMode: "specific",
            },
            30000,
          );
          if (result && result.success === false) throw new Error(result.message || "打开失败");
        } catch (error) {
          showToast(error.message || "真实播放器暂不可用");
        }
      }

      async function openNativePlayer() {
        await openNativePlayerFor(activeDrama, activeEpisode);
      }

      async function refreshNativeList() {
        try {
          nativeLoading = true;
          updateLoadMoreButton();
          setSdkStatus("穿山甲启动中", false);
          await callNative(window.SkitPangleDramaNative, "start", { settingFile: PANGLE_SETTING_FILE, debug: true }, 30000);
          const result = await callNative(
            window.SkitPangleDramaNative,
            "list",
            { settingFile: PANGLE_SETTING_FILE, page: 1, count: PANGLE_INITIAL_COUNT, order: true },
            30000,
          );
          if (result && result.success === false) throw new Error(result.message || "剧单拉取失败");
          const nativeList = Array.isArray(result.list) ? result.list.map(normalizeNativeDrama).filter((item) => item.nativeId) : [];
          if (nativeList.length > 0) {
            dramas = nativeList;
            nativeMode = true;
            nativePage = Math.ceil(nativeList.length / PANGLE_PAGE_SIZE);
            nativeHasMore = nativeList.length >= PANGLE_PAGE_SIZE;
            setSdkStatus("真实剧单已载入", true);
            renderHome();
          } else {
            nativeMode = false;
            nativeHasMore = false;
            setSdkStatus("SDK 已启动", true);
            showToast("真实剧单为空，先展示内置剧目");
            renderHome();
          }
        } catch (error) {
          nativeMode = false;
          nativeHasMore = false;
          setSdkStatus("SDK 待配置", false);
          showToast(error.message || "穿山甲短剧 SDK 暂不可用");
          renderHome();
        } finally {
          nativeLoading = false;
          updateLoadMoreButton();
        }
      }

      async function loadMoreNativeList() {
        if (nativeLoading || !nativeMode || !nativeHasMore) return;
        try {
          nativeLoading = true;
          updateLoadMoreButton();
          const nextPage = nativePage + 1;
          const result = await callNative(
            window.SkitPangleDramaNative,
            "list",
            { settingFile: PANGLE_SETTING_FILE, page: nextPage, count: PANGLE_PAGE_SIZE, order: true },
            30000,
          );
          if (result && result.success === false) throw new Error(result.message || "剧单拉取失败");
          const nativeList = Array.isArray(result.list) ? result.list.map(normalizeNativeDrama).filter((item) => item.nativeId) : [];
          if (nativeList.length === 0) {
            nativeHasMore = false;
            showToast("没有更多真实剧单");
            return;
          }
          dramas = mergeNativeDramas(nativeList);
          nativePage = nextPage;
          nativeHasMore = nativeList.length >= PANGLE_PAGE_SIZE;
          renderHome();
        } catch (error) {
          showToast(error.message || "更多真实剧单加载失败");
        } finally {
          nativeLoading = false;
          updateLoadMoreButton();
        }
      }

      document.getElementById("refreshNative").onclick = refreshNativeList;
      document.getElementById("loadMoreNative").onclick = loadMoreNativeList;
      document.getElementById("profileVisitorId").textContent = getVisitorId();
      document.getElementById("profileLogin").onclick = () => showToast("当前为游客测试账号");
      const showFollowPanel = () => {
        if (followedDramaIds.size === 0) {
          showToast("还没有追剧，先在首页加入一部短剧");
          return;
        }
        document.getElementById("profileFollowPanel").scrollIntoView({ behavior: "smooth", block: "start" });
      };
      document.getElementById("profileFollowMenu").onclick = showFollowPanel;
      document.getElementById("profileFollowAll").onclick = showFollowPanel;
      document.getElementById("profileVipMenu").onclick = () =>
        showInfoModal("VIP 权益", "正式版本将提供免广告、专属剧集和提前观看权益；当前测试包暂不产生付费。");
      document.getElementById("profileAboutMenu").onclick = () =>
        showInfoModal("关于短剧 SaaS", "当前为穿山甲短剧内容 SDK 测试版，包名 top.neoshen.xingheyingguan，用于验证真实剧单、播放和广告解锁链路。");
      document.getElementById("infoModalClose").onclick = closeInfoModal;
      document.getElementById("infoModal").onclick = (event) => {
        if (event.target.id === "infoModal") closeInfoModal();
      };
      document.querySelectorAll(".tabbar-item").forEach((item) => {
        item.onclick = () => showTab(item.dataset.tab);
      });
      window.addEventListener(
        "scroll",
        () => {
          if (currentTab !== "home" && currentTab !== "theater") return;
          if (window.innerHeight + window.scrollY < document.body.scrollHeight - 640) return;
          loadMoreNativeList();
        },
        { passive: true },
      );
      renderHome();
      setTimeout(refreshNativeList, 500);
    </script>
  </body>
</html>
