name: Android production APK

on:
  workflow_dispatch:
    inputs:
      profile_code:
        description: Agent release profile code and signed runtime tenant ID
        required: true
        type: string
      runtime_release_no:
        description: Monotonic base APK runtime release number
        required: true
        type: string
      native_version_code:
        description: Monotonic Android versionCode, 1..2100000000
        required: true
        type: string
      native_version_name:
        description: Native release version, for example 2.3.0
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: android-production-${{ inputs.profile_code }}
  cancel-in-progress: false

jobs:
  build:
    if: github.ref == 'refs/heads/master'
    name: Build the unique signed production APK
    runs-on: [self-hosted, macOS, hbuilderx, android]
    environment: android-production-${{ inputs.profile_code }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve exact versioned agent profile
        id: profile
        env:
          PROFILE_CODE: ${{ inputs.profile_code }}
        run: |
          set -euo pipefail
          node android-djx-runtime/resolve-build-profile.mjs \
            --profile-code "$PROFILE_CODE" \
            --github-env "$GITHUB_ENV" \
            --github-output "$GITHUB_OUTPUT"

      - name: Materialize protected inputs
        env:
          PANGLE_SETTINGS_JSON_BASE64: ${{ secrets.PANGLE_SETTINGS_JSON_BASE64 }}
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          : "${PANGLE_SETTINGS_JSON_BASE64:?Set PANGLE_SETTINGS_JSON_BASE64}"
          : "${RELEASE_KEYSTORE_BASE64:?Set RELEASE_KEYSTORE_BASE64}"
          mkdir -p "$RUNNER_TEMP/skit-production"
          printf '%s' "$PANGLE_SETTINGS_JSON_BASE64" | \
            python3 -c 'import base64,sys; sys.stdout.buffer.write(base64.b64decode(sys.stdin.buffer.read()))' \
            > "$RUNNER_TEMP/skit-production/SDK_Setting.json"
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | \
            python3 -c 'import base64,sys; sys.stdout.buffer.write(base64.b64decode(sys.stdin.buffer.read()))' \
            > "$RUNNER_TEMP/skit-production/release.keystore"
          chmod 600 "$RUNNER_TEMP/skit-production/"*

      - name: Install locked H5 dependencies
        run: npm ci

      - name: Verify locked official Taku adapter bundle
        run: |
          node android-djx-runtime/verify-taku-adapter-bundle.mjs \
            --mode source \
            --manifest android-djx-runtime/taku-adapter-bundle.lock.json \
            --bundle-dir android-djx-runtime/app/libs/taku \
            --keep-file android-djx-runtime/app/src/main/res/raw/keep.xml

      - name: Build and verify production APK
        env:
          SKIT_BUILD_TYPE: release
          SKIT_PROFILE_CODE: ${{ inputs.profile_code }}
          SKIT_AGENT_CODE: ${{ inputs.profile_code }}
          SKIT_API_BASE_URL: ${{ secrets.SKIT_API_BASE_URL }}
          SKIT_PANGLE_SETTINGS_JSON: ${{ runner.temp }}/skit-production/SDK_Setting.json
          SKIT_TAKU_APP_KEY: ${{ secrets.SKIT_TAKU_APP_KEY }}
          SKIT_RELEASE_STORE_FILE: ${{ runner.temp }}/skit-production/release.keystore
          SKIT_RELEASE_STORE_PASSWORD: ${{ secrets.SKIT_RELEASE_STORE_PASSWORD }}
          SKIT_RELEASE_KEY_ALIAS: ${{ secrets.SKIT_RELEASE_KEY_ALIAS }}
          SKIT_RELEASE_KEY_PASSWORD: ${{ secrets.SKIT_RELEASE_KEY_PASSWORD }}
          SKIT_RELEASE_CERT_SHA256: ${{ vars.SKIT_RELEASE_CERT_SHA256 }}
          SKIT_TENANT_ID: ${{ inputs.profile_code }}
          SKIT_RUNTIME_UPDATE_PUBLIC_KEY: ${{ vars.SKIT_RUNTIME_UPDATE_PUBLIC_KEY }}
          SKIT_RUNTIME_PROTOCOL_VERSION: ${{ vars.SKIT_RUNTIME_PROTOCOL_VERSION }}
          SKIT_RUNTIME_RELEASE_NO: ${{ inputs.runtime_release_no }}
          SKIT_VERSION_CODE: ${{ inputs.native_version_code }}
          SKIT_VERSION_NAME: ${{ inputs.native_version_name }}
        run: |
          set -euo pipefail
          ./android-djx-runtime/build-djx-apk.sh
          APK_FILE="$PWD/dist/${SKIT_OUTPUT_BASE_NAME}-release.apk" \
            ./android-djx-runtime/verify-production-apk.sh
          APK_FILE="$PWD/dist/${SKIT_OUTPUT_BASE_NAME}-release.apk" \
            ./android-djx-runtime/run-reusable-package-gate.sh

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: android-production-${{ inputs.profile_code }}-v${{ steps.profile.outputs.profile_version }}-${{ github.sha }}
          path: dist/${{ steps.profile.outputs.output_base_name }}-release.apk
          if-no-files-found: error
          retention-days: 30

      - name: Erase protected build inputs
        if: always()
        run: rm -rf "$RUNNER_TEMP/skit-production"
