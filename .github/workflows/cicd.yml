name: App CI/CD

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: skit-saas-app-${{ github.ref }}
  cancel-in-progress: true

env:
  PACKAGE_NAME: skit-saas-app-source
  PACKAGE_TAG: ${{ github.sha }}

jobs:
  package-and-deploy:
    if: github.ref == 'refs/heads/master'
    name: Package and deploy app source
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.10.2'

      - name: Validate app metadata
        run: |
          node - <<'NODE'
          const fs = require('fs')
          for (const file of ['package.json', 'manifest.json', 'pages.json']) {
            JSON.parse(fs.readFileSync(file, 'utf8'))
            console.log(`${file} ok`)
          }
          NODE

      - name: Enforce Skit member identity boundary
        run: node scripts/check-member-identity-boundary.mjs

      - name: Verify locked official Taku adapter bundle
        run: |
          node android-djx-runtime/verify-taku-adapter-bundle.mjs \
            --mode source \
            --manifest android-djx-runtime/taku-adapter-bundle.lock.json \
            --bundle-dir android-djx-runtime/app/libs/taku \
            --keep-file android-djx-runtime/app/src/main/res/raw/keep.xml

      - name: Enforce server-verified ad session boundary
        run: node --test tests/app/*.test.mjs

      - name: Compile and test Android debug runtime
        run: |
          set -euo pipefail
          DEBUG_PANGLE_SETTINGS="${RUNNER_TEMP}/skit-debug-pangle/SDK_Setting.json"
          mkdir -p "$(dirname "${DEBUG_PANGLE_SETTINGS}")"
          printf '%s\n' '{}' > "${DEBUG_PANGLE_SETTINGS}"
          SKIT_PANGLE_SETTINGS_JSON="${DEBUG_PANGLE_SETTINGS}" \
            gradle --no-daemon -p android-djx-runtime \
            :app:checkDebugDuplicateClasses :app:testDebugUnitTest :app:assembleDebug
          jar tf android-djx-runtime/app/build/outputs/apk/debug/app-debug.apk \
            > "${RUNNER_TEMP}/skit-debug-apk-entries.txt"
          grep -Fxq 'assets/www/index.html' "${RUNNER_TEMP}/skit-debug-apk-entries.txt"
          grep -Fxq 'assets/www/djx-runtime.js' "${RUNNER_TEMP}/skit-debug-apk-entries.txt"

      - name: Package source bundle
        run: |
          set -euo pipefail
          mkdir -p .deploy
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='unpackage' \
            --exclude='.deploy' \
            -czf ".deploy/${PACKAGE_NAME}-${PACKAGE_TAG}.tar.gz" \
            .

      - name: Detect deployment secrets
        id: deploy_config
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
        run: |
          if [ -n "${SERVER_HOST}" ] && [ -n "${SERVER_USER}" ] && { [ -n "${SERVER_SSH_KEY}" ] || [ -n "${SERVER_PASSWORD}" ]; }; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
          else
            echo "::notice::Deployment skipped because SERVER_HOST, SERVER_USER, and one of SERVER_SSH_KEY or SERVER_PASSWORD are not configured."
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Prepare SSH
        if: steps.deploy_config.outputs.enabled == 'true'
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
        run: |
          set -euo pipefail
          : "${SERVER_HOST:?Set SERVER_HOST secret}"
          AUTH_VALUE="${SERVER_SSH_KEY:-${SERVER_PASSWORD:-}}"
          : "${AUTH_VALUE:?Set SERVER_SSH_KEY or SERVER_PASSWORD secret}"
          SERVER_PORT="${SERVER_PORT:-22}"
          install -m 700 -d ~/.ssh
          KEY_FILE="$HOME/.ssh/skit_deploy_key"
          if printf '%s' "${AUTH_VALUE}" | grep -q -- '-----BEGIN .*PRIVATE KEY-----'; then
            printf '%s' "${AUTH_VALUE}" | perl -0pe 's/\\n/\n/g; s/\r\n?/\n/g; s/\n?$/\n/' > "${KEY_FILE}"
            chmod 600 "${KEY_FILE}"
            if ! ssh-keygen -y -P "" -f "${KEY_FILE}" >/dev/null; then
              echo "::error::SERVER_SSH_KEY looks like a private key, but it is not readable. Use an unencrypted private key or set SERVER_PASSWORD instead."
              exit 1
            fi
            printf 'SKIT_AUTH_MODE=key\n' > .deploy/ssh-auth.env
          else
            if printf '%s' "${AUTH_VALUE}" | tr -d '\r\n ' | base64 -d > "${KEY_FILE}" 2>/tmp/skit_key_decode_error \
              && chmod 600 "${KEY_FILE}" \
              && ssh-keygen -y -P "" -f "${KEY_FILE}" >/dev/null 2>&1; then
              printf 'SKIT_AUTH_MODE=key\n' > .deploy/ssh-auth.env
            else
              sudo apt-get update
              sudo apt-get install -y sshpass
              {
                printf 'SKIT_AUTH_MODE=password\n'
                printf 'SKIT_SSH_PASSWORD=%q\n' "${AUTH_VALUE}"
              } > .deploy/ssh-auth.env
            fi
          fi
          chmod 600 .deploy/ssh-auth.env
          cat > .deploy/ssh <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          # shellcheck disable=SC1091
          . "$(dirname "$0")/ssh-auth.env"
          SERVER_PORT="${SERVER_PORT:-22}"
          if [ "${SKIT_AUTH_MODE}" = "password" ]; then
            SSHPASS="${SKIT_SSH_PASSWORD}" sshpass -e ssh -o PreferredAuthentications=password,keyboard-interactive -o PubkeyAuthentication=no -p "${SERVER_PORT}" "$@"
          else
            ssh -i "$HOME/.ssh/skit_deploy_key" -p "${SERVER_PORT}" "$@"
          fi
          EOF
          cat > .deploy/scp <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          # shellcheck disable=SC1091
          . "$(dirname "$0")/ssh-auth.env"
          SERVER_PORT="${SERVER_PORT:-22}"
          if [ "${SKIT_AUTH_MODE}" = "password" ]; then
            SSHPASS="${SKIT_SSH_PASSWORD}" sshpass -e scp -o PreferredAuthentications=password,keyboard-interactive -o PubkeyAuthentication=no -P "${SERVER_PORT}" "$@"
          else
            scp -i "$HOME/.ssh/skit_deploy_key" -P "${SERVER_PORT}" "$@"
          fi
          EOF
          chmod +x .deploy/ssh .deploy/scp
          if [ "${SERVER_PORT}" != "22" ]; then
            echo "::error::The pinned production SSH host key currently authorizes port 22 only."
            exit 1
          fi
          install -m 600 deploy/known_hosts ~/.ssh/known_hosts
          ssh-keygen -F "${SERVER_HOST}" -f ~/.ssh/known_hosts >/dev/null \
            || { echo "::error::SERVER_HOST is not present in deploy/known_hosts"; exit 1; }

      - name: Upload app source bundle
        if: steps.deploy_config.outputs.enabled == 'true'
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          : "${SERVER_USER:?Set SERVER_USER secret}"
          SERVER_PORT="${SERVER_PORT:-22}"
          DEPLOY_PATH="${DEPLOY_PATH:-skit-saas}"
          SSH_TARGET="${SERVER_USER}@${SERVER_HOST}"
          .deploy/ssh "${SSH_TARGET}" \
            "mkdir -p '${DEPLOY_PATH}/app-source/releases/${PACKAGE_TAG}'"
          .deploy/scp \
            ".deploy/${PACKAGE_NAME}-${PACKAGE_TAG}.tar.gz" \
            "${SSH_TARGET}:${DEPLOY_PATH}/app-source/releases/"
          .deploy/ssh "${SSH_TARGET}" \
            "cd '${DEPLOY_PATH}/app-source' && tar -xzf 'releases/${PACKAGE_NAME}-${PACKAGE_TAG}.tar.gz' -C 'releases/${PACKAGE_TAG}' && ln -sfn 'releases/${PACKAGE_TAG}' current"
