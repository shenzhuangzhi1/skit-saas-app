name: App CI/CD

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: skit-saas-app-${{ github.ref }}
  cancel-in-progress: true

env:
  PACKAGE_NAME: skit-saas-app-source
  PACKAGE_TAG: ${{ github.sha }}

jobs:
  package-and-deploy:
    name: Package and deploy app source
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate app metadata
        run: |
          node - <<'NODE'
          const fs = require('fs')
          for (const file of ['package.json', 'manifest.json', 'pages.json']) {
            JSON.parse(fs.readFileSync(file, 'utf8'))
            console.log(`${file} ok`)
          }
          NODE

      - name: Package source bundle
        run: |
          set -euo pipefail
          mkdir -p .deploy
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='unpackage' \
            --exclude='.deploy' \
            -czf ".deploy/${PACKAGE_NAME}-${PACKAGE_TAG}.tar.gz" \
            .

      - name: Detect deployment secrets
        id: deploy_config
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          if [ -n "${SERVER_HOST}" ] && [ -n "${SERVER_USER}" ] && [ -n "${SERVER_SSH_KEY}" ]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
          else
            echo "::notice::Deployment skipped because SERVER_HOST, SERVER_USER, or SERVER_SSH_KEY is not configured."
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Prepare SSH
        if: steps.deploy_config.outputs.enabled == 'true'
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          set -euo pipefail
          : "${SERVER_HOST:?Set SERVER_HOST secret}"
          : "${SERVER_SSH_KEY:?Set SERVER_SSH_KEY secret}"
          SERVER_PORT="${SERVER_PORT:-22}"
          install -m 700 -d ~/.ssh
          KEY_FILE="$HOME/.ssh/skit_deploy_key"
          if printf '%s' "${SERVER_SSH_KEY}" | grep -q -- '-----BEGIN .*PRIVATE KEY-----'; then
            printf '%s' "${SERVER_SSH_KEY}" | perl -0pe 's/\\n/\n/g; s/\r\n?/\n/g; s/\n?$/\n/' > "${KEY_FILE}"
          else
            if ! printf '%s' "${SERVER_SSH_KEY}" | tr -d '\r\n ' | base64 -d > "${KEY_FILE}" 2>/tmp/skit_key_decode_error; then
              echo "::error::SERVER_SSH_KEY must be an unencrypted private key in raw multiline format, literal \\n format, or base64 format."
              exit 1
            fi
          fi
          chmod 600 "${KEY_FILE}"
          if ! ssh-keygen -y -f "${KEY_FILE}" >/dev/null; then
            echo "::error::SERVER_SSH_KEY is not a readable unencrypted private key."
            exit 1
          fi
          ssh-keyscan -p "${SERVER_PORT}" "${SERVER_HOST}" >> ~/.ssh/known_hosts

      - name: Upload app source bundle
        if: steps.deploy_config.outputs.enabled == 'true'
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          : "${SERVER_USER:?Set SERVER_USER secret}"
          SERVER_PORT="${SERVER_PORT:-22}"
          DEPLOY_PATH="${DEPLOY_PATH:-/opt/skit-saas}"
          SSH_TARGET="${SERVER_USER}@${SERVER_HOST}"
          ssh -i ~/.ssh/skit_deploy_key -p "${SERVER_PORT}" "${SSH_TARGET}" \
            "mkdir -p '${DEPLOY_PATH}/app-source/releases/${PACKAGE_TAG}'"
          scp -i ~/.ssh/skit_deploy_key -P "${SERVER_PORT}" \
            ".deploy/${PACKAGE_NAME}-${PACKAGE_TAG}.tar.gz" \
            "${SSH_TARGET}:${DEPLOY_PATH}/app-source/releases/"
          ssh -i ~/.ssh/skit_deploy_key -p "${SERVER_PORT}" "${SSH_TARGET}" \
            "cd '${DEPLOY_PATH}/app-source' && tar -xzf 'releases/${PACKAGE_NAME}-${PACKAGE_TAG}.tar.gz' -C 'releases/${PACKAGE_TAG}' && ln -sfn 'releases/${PACKAGE_TAG}' current"
